<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Align 360 Move — Log In</title>
  <link rel="stylesheet" href="css/global.css" />
</head>
<body>
  <div class="app-shell">
    <section class="login-hero">
      <div class="logo-mark">⛑</div>
      <h1>ALIGN 360</h1>
      <h2>MOVE</h2>
      <p class="login-subtitle">Sign in to your Account</p>
    </section>

    <section class="form-card">
      <form>
        <label class="input-group">
          <span class="input-label">Email</span>
          <input type="email" placeholder="Loisbecket@emircom.com" />
        </label>

        <label class="input-group">
          <span class="input-label">Password</span>
          <div class="password-field">
            <input type="password" placeholder="********" />
            <button type="button" class="eye-toggle" aria-label="Toggle password visibility">👁️</button>
          </div>
        </label>

        <div class="field-row">
          <label class="checkbox-label">
            <input type="checkbox" />
            Remember me
          </label>
          <a href="#" class="link-secondary">Forgot Password?</a>
        </div>

        <button type="submit" class="primary-button">Log In</button>
      </form>
      <p class="helper-text">Trouble Logging In? <a href="#">Contact Support</a></p>
    </section>
  </div>
</body>
</html>
