<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Align 360 Move — Dashboard</title>
  <link rel="stylesheet" href="css/global.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-shell home-shell">
    
    <!-- Top Header -->
    <header class="home-header">
      <h1>Good morning, Alexa!</h1>
      <div class="profile-pic">
        <img src="https://i.pravatar.cc/150?img=47" alt="Alexa Profile" />
        <span class="online-dot-avatar"></span>
      </div>
    </header>

    <!-- Sync Status -->
    <div class="sync-status">
      <div class="sync-left">
        <span class="online-dot"></span>
        <span>Online · All changes synced</span>
      </div>
      <div class="sync-right">
        <span>2 min ago</span>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <svg viewBox="0 0 24 24" width="20" height="20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" placeholder="Search" />
    </div>

    <!-- Toggle Tabs -->
    <div class="toggle-tabs">
      <button class="tab active">Today's Site</button>
      <button class="tab">Scheduled <span class="badge-count">10</span></button>
    </div>

    <!-- Horizontal Site Cards -->
    <div class="site-cards-container">
    </div>

    <!-- Pagination Dots -->
    <div class="pagination-dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <!-- Messages Section -->
    <div class="home-section-header">
      <h3>Messages / Threaded Communications</h3>
      <a href="#" class="link-show-all">Show All</a>
    </div>

    <div class="message-grid">
      <div class="message-card yellow-card">
        <div class="msg-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M6 3v12"></path><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>
        </div>
        <h4>Turbine Inspection</h4>
        <p class="new-msgs">3+ New messages</p>
      </div>

      <div class="message-card purple-light-card">
        <div class="msg-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M6 3v12"></path><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><path d="M18 9a9 9 0 0 1-9 9"></path></svg>
        </div>
        <h4>Turbine Inspection</h4>
        <p class="new-msgs">3+ New messages</p>
      </div>
    </div>

    <!-- Bottom Navigation Floating Bar -->
    <div id="bottom-nav-container"></div>
  </div>
  <script src="js/bottomNav.js"></script>
</body>
</html>
