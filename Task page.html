<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Align 360 Move — Task Page</title>
  <link rel="stylesheet" href="css/global.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-shell tasks-shell">
    
    <!-- Top Header -->
    <header class="calendar-top-header">
      <h1>Tasks</h1>
      <button class="icon-button" style="border-radius: 50%; background: var(--primary); color: #ffffff; width: 44px; height: 44px; box-shadow: 0 4px 12px rgba(24,102,255,0.2); border: none;">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </header>

    <!-- Search Bar -->
    <div class="search-bar" style="margin-bottom: 16px;">
      <svg viewBox="0 0 24 24" width="20" height="20" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" placeholder="Search tasks..." />
    </div>

    <!-- View Toggle Tabs -->
    <div class="toggle-tabs">
      <a href="#" class="tab active">All</a>
      <a href="#" class="tab">In Progress</a>
      <a href="#" class="tab">Completed</a>
    </div>

    <!-- Task List Container -->
    <div id="task-list-container" style="padding-bottom: 100px;"></div>

    <script>
      // Load the site card component into the task list
      fetch('./components/site card.html')
        .then(response => response.text())
        .then(data => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(data, 'text/html');
          document.getElementById('task-list-container').innerHTML = doc.body.innerHTML;
          
          // Ensure the JavaScript (toggleExpand) from the fetched component is evaluated
          const scripts = doc.querySelectorAll('script');
          scripts.forEach(script => {
            const newScript = document.createElement('script');
            newScript.textContent = script.textContent;
            document.body.appendChild(newScript);
          });
        });
    </script>
   
    <!-- Bottom Navigation Floating Bar -->
    <div id="bottom-nav-container"></div>
    <script>
      fetch('components/bottom nav.html?v=2')
        .then(response => response.text())
        .then(data => {
          document.getElementById('bottom-nav-container').innerHTML = data;
          lucide.createIcons();
          const navItems = document.querySelectorAll('.bottom-nav .nav-item');
          if (navItems.length >= 1) {
            navItems.forEach(el => el.classList.remove('active'));
            navItems[0].classList.add('active'); // Index 0 = Home
          }
        })
        .catch(err => console.error('Error loading bottom nav:', err));
    </script>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
