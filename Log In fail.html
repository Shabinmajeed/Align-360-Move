<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Align 360 Move — Log In Failed</title>
  <link rel="stylesheet" href="css/global.css" />
</head>
<body>
  <div class="app-shell login-shell">
    <section class="login-hero">
      <div class="logo-mark" style="background: var(--warning-soft); color: var(--warning);">⚠️</div>
      <p class="eyebrow" style="color: var(--warning);">Authentication Error</p>
      <h1>Log In Failed</h1>
      <p class="login-subtitle">We couldn't verify your credentials.</p>
    </section>

    <section class="login-container">
      <div class="action-panel" style="text-align: center; margin-top: 24px; border: 1px solid var(--border);">
        <h2 style="color: var(--text-strong); margin-bottom: 12px;">Access Denied</h2>
        <p>The email or password you entered is incorrect. Please check your credentials and try again.</p>
        <br/>
        <!-- Link back to the Log In page (or index.html if renamed) -->
        <a href="Index.html" class="primary-button" style="display: inline-block; text-decoration: none; padding: 16px 0; text-align: center; width: 100%; box-sizing: border-box;">Try Again</a>
      </div>
      <p class="helper-text">Trouble logging in? <a href="#" class="link-secondary">Contact Support</a></p>
    </section>
  </div>
</body>
</html>
