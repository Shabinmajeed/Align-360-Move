<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Align 360 Move — Log In</title>
  <link rel="stylesheet" href="./css/global.css" />
</head>
<body>
  <div class="app-shell login-shell">
    
    <!-- COMPONENT: Login Hero Section -->
    <!-- Displays the brand identity, logo, and primary heading -->
    <section class="login-hero">
      <div class="logo-mark">⛑️</div>
      <p class="eyebrow">Field Operations</p>
      <h1>Align 360 Move</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </section>

    <!-- COMPONENT: Login Form Container -->
    <section class="login-container">
      <form class="login-form">
        <!-- Email Input Group -->
        <label class="input-group">
          <span class="input-label">Email</span>
          <input type="email" id="email" placeholder="name@emircom.com" class="form-input" required />
        </label>

        <!-- Password Input Group with Visibility Toggle -->
        <label class="input-group">
          <span class="input-label">Password</span>
          <div class="password-field">
            <input type="password" id="password" placeholder="••••••••" class="form-input" required />
            <button type="button" id="togglePassword" class="eye-toggle" aria-label="Toggle password visibility">👁️</button>
          </div>
        </label>

        <!-- Dynamic Error Message Block -->
        <div id="errorMessage" style="color: #d93025; font-size: 0.875rem; display: none; margin-bottom: 1rem;"></div>

        <!-- Form Utilities: Remember Me & Forgot Password -->
        <div class="field-row">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" />
            <span>Remember me</span>
          </label>
          <a href="./Log In fail.html" class="link-secondary">Forgot Password?</a>
        </div>

        <!-- Primary Action Button -->
        <button type="submit" id="loginBtn" class="primary-button full-width" disabled>Log In</button>
      </form>

      <!-- Secondary Support Link -->
      <p class="helper-text">Trouble logging in? <a href="#" class="link-secondary">Contact Support</a></p>
    </section>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const loginBtn = document.getElementById('loginBtn');
      const togglePasswordBtn = document.getElementById('togglePassword');
      const loginForm = document.querySelector('.login-form');
      const errorMessage = document.getElementById('errorMessage');

      // 4. Disable log in button if the fields are left blank
      function checkInputs() {
        if (emailInput.value.trim() !== '' && passwordInput.value.trim() !== '') {
          loginBtn.disabled = false;
        } else {
          loginBtn.disabled = true;
        }
      }

      emailInput.addEventListener('input', checkInputs);
      passwordInput.addEventListener('input', checkInputs);
      
      // Run the check on page load to account for browser autofill
      setTimeout(checkInputs, 100);

      // 3. Password visibility toggle
      togglePasswordBtn.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
      });

      // Form submission validation & redirect
      loginForm.addEventListener('submit', function (e) {
        e.preventDefault();
        
        const emailVal = emailInput.value.trim();
        const passwordVal = passwordInput.value;
        
        // Redirect to fail page if password is too short
        if (passwordVal.length <= 2) {
          window.location.href = './Log In fail.html';
          return;
        }

        // 2 & 7. Validate email domain & display error
        if (!emailVal.endsWith('@emircom.com')) {
          errorMessage.textContent = 'Please use a valid @emircom.com email address.';
          errorMessage.style.display = 'block';
          return;
        }
        
        errorMessage.style.display = 'none';
        
        // 6. Redirect to home page upon successful verification
        window.location.href = './Home page.html';
      });
    });
  </script>
</body>
</html>
