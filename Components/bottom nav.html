<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottom Nav Prototype</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --nav-bg: #ffffff;
            --active-blue: #1866ff;
            --inactive-gray: #7d8bac;
            --border-color: #e2e8f0;
            /* 
               Design Tokens: 
               Centralized color variables for consistent branding across the navigation component.
            */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            position: relative;
        }

        /**
         * .bottom-nav
         * The main floating container for the navigation bar.
         * Uses fixed positioning to stay at the bottom of the viewport.
         */
        .bottom-nav {
            position: fixed;
            bottom: 20px; /* Floating style */
            left: 25px;
            right: 25px;
            width: auto;
            margin: 0 auto;
            max-width: 320px;
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            border-radius: 40px; /* Highly rounded corners */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        /**
         * .nav-item
         * Flex container for icons and labels within the main bar.
         * Includes hover/active transitions for interactive feedback.
         */
        .nav-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--inactive-gray);
            transition: all 0.2s ease;
            flex: 1;
            width: 60px;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            transition: transform 0.2s ease;
        }

        .nav-item span {
            font-size: 12px;
            font-weight: 600;
        }

        /**
         * Active State Styles
         * Highlights the current page/selection using the primary blue color.
         */
        .nav-item.active {
            color: var(--active-blue);
        }

        .nav-item.active svg {
            fill: currentColor;
            stroke: currentColor;
            /* 
               Visual lift effect: 
               Subtle vertical translation to indicate the active selection.
            */
            transform: translateY(-2px);
        }

        /**
         * .more-menu-panel
         * The vertical drawer that appears when the 'More' button is clicked.
         * Positioned relative to the bottom-right of the screen.
         */
        .more-menu-panel {
            position: fixed;
            bottom: 100px; /* Added spacing to sit slightly higher above the nav bar */
            right: 35px;
            left: auto;
            margin: 0;
            width: auto;
            background-color: transparent;
            border: none;
            box-shadow: none;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
            
            /* Hidden by default with smooth transitional parameters */
            opacity: 0;
            transform: translateY(15px) scale(0.95);
            transform-origin: bottom right;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .more-menu-panel.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        /**
         * .more-menu-item
         * Individual action buttons within the expanded 'More' menu.
         * Layout is vertical (Icon over Text).
         */
        .more-menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 80px;
            text-align: center;
            color: #1e293b;
            text-decoration: none;
            font-size: 11px;
            line-height: 1.2;
            font-weight: 600;
        }

        .more-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background-color: var(--nav-bg);
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        /* 
           Hover Interaction:
           Elevates the icon circle and deepens the shadow for a tactile feel.
        */
        .more-menu-item:hover .more-icon-wrapper, .more-menu-item:active .more-icon-wrapper {
            background-color: #f8fafc;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .more-menu-item svg {
            width: 22px;
            height: 22px;
            color: var(--inactive-gray);
        }

        /**
         * .menu-overlay
         * A full-screen transparent/dimmed layer that catches clicks 
         * outside the menu to trigger a close action.
         */
        .menu-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.1);
            z-index: 998;
            display: none;
        }
        .menu-overlay.visible {
            display: block;
        }

        .content {
            padding: 20px;
            padding-bottom: 100px; 
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Background overlay for menu dismissal -->
    <div class="menu-overlay" id="menuOverlay"></div>

    <!-- Hidden 'More' Menu Panel: Contains secondary navigation links -->
    <div class="more-menu-panel" id="moreMenuPanel">
        <a href="../Communications.html" class="more-menu-item">
            <div class="more-icon-wrapper">
                <i data-lucide="mail"></i>
            </div>
            <span>Messages</span>
        </a>
        <a href="../Journey & Expense.html" class="more-menu-item">
            <div class="more-icon-wrapper">
                <i data-lucide="car"></i>
            </div>
            <span>Journey & Expense</span>
        </a>
        <a href="../Daily Progress Report.html" class="more-menu-item">
            <div class="more-icon-wrapper">
                <i data-lucide="file-check-2"></i>
            </div>
            <span>Daily Progress Report</span>
        </a>
        <a href="../Profile.html" class="more-menu-item">
            <div class="more-icon-wrapper">
                <i data-lucide="user"></i>
            </div>
            <span>Profile</span>
        </a>
    </div>

    <!-- Primary Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="../Home page.html" class="nav-item">
            <i data-lucide="home"></i>
            <span>Home</span>
        </a>
        <a href="../Task page.html" class="nav-item">
            <i data-lucide="layout-grid"></i>
            <span>Task</span>
        </a>
        <a href="../Calendar.html" class="nav-item">
            <i data-lucide="calendar"></i>
            <span>Calendar</span>
        </a>
        <button class="nav-item" id="moreMenuBtn">
            <i data-lucide="menu"></i>
            <span>More</span>
        </button>
    </nav>

    <script>
        /**
         * Navigation Logic
         * Handles the toggling of the 'More' menu and icon initialization.
         */
        
        // Initialize Lucide icons
        lucide.createIcons();

        const moreBtn = document.getElementById('moreMenuBtn');
        const morePanel = document.getElementById('moreMenuPanel');
        const overlay = document.getElementById('menuOverlay');

        // Toggle function for the 'More' menu
        function toggleMenu() {
            const isOpen = morePanel.classList.toggle('visible');
            overlay.classList.toggle('visible', isOpen);
        }

        // Event Listeners
        moreBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

    </script>

</body>
</html>
