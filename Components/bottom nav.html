<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottom Nav Prototype</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --nav-bg: #ffffff;
            --active-blue: #1866ff;
            --inactive-gray: #7d8bac;
            --border-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            position: relative;
        }

        /* Container for the Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 20px; /* Floating style */
            left: 25px;
            right: 25px;
            width: auto;
            margin: 0 auto;
            max-width: 320px;
            background-color: var(--nav-bg);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            border-radius: 40px; /* Highly rounded corners */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 1000;
        }

        /* Individual Nav Item */
        .nav-item {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--inactive-gray);
            transition: all 0.2s ease;
            flex: 1;
            width: 60px;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            transition: transform 0.2s ease;
        }

        .nav-item span {
            font-size: 12px;
            font-weight: 600;
        }

        /* Active State */
        .nav-item.active {
            color: var(--active-blue);
        }

        .nav-item.active svg {
            fill: currentColor;
            stroke: currentColor;
            transform: translateY(-2px);
        }

        /* Floating 'More' Menu Panel Options */
        .more-menu-panel {
            position: fixed;
            bottom: 85px; /* Sits cleanly right above the rounded nav bar */
            left: 25px;
            right: 25px;
            margin: 0 auto;
            max-width: 280px;
            background-color: var(--nav-bg);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-color);
            overflow: hidden;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            
            /* Hidden by default with smooth transitional parameters */
            opacity: 0;
            transform: translateY(15px) scale(0.95);
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .more-menu-panel.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .more-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: #1e293b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            border-bottom: 1px solid var(--border-color);
        }

        .more-menu-item:last-child {
            border-bottom: none;
        }

        .more-menu-item:hover, .more-menu-item:active {
            background-color: #f8fafc;
        }

        .more-menu-item svg {
            width: 18px;
            height: 18px;
            color: var(--inactive-gray);
        }

        /* Backdrop Overlay curtain to dim background and close menu when clicked outside */
        .menu-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.1);
            z-index: 998;
            display: none;
        }
        .menu-overlay.visible {
            display: block;
        }

        .content {
            padding: 20px;
            padding-bottom: 100px; 
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="more-menu-panel" id="moreMenuPanel">
        <a href="../Communications.html" class="more-menu-item">
            <i data-lucide="mail"></i>
            <span>Messages</span>
        </a>
        <a href="../Journey & Expense.html" class="more-menu-item">
            <i data-lucide="car"></i>
            <span>Journey & Expense</span>
        </a>
        <a href="../Daily Progress Report.html" class="more-menu-item">
            <i data-lucide="file-check-2"></i>
            <span>Daily Progress Report</span>
        </a>
    </div>

    <nav class="bottom-nav">
        <a href="../Home page.html" class="nav-item">
            <i data-lucide="home"></i>
            <span>Home</span>
        </a>
        <a href="../Task page.html" class="nav-item">
            <i data-lucide="layout-grid"></i>
            <span>Task</span>
        </a>
        <a href="../Calendar.html" class="nav-item">
            <i data-lucide="calendar"></i>
            <span>Calendar</span>
        </a>
        <button class="nav-item" id="moreMenuBtn">
            <i data-lucide="menu"></i>
            <span>More</span>
        </button>
    </nav>

</body>
</html>
